<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Interactive card details form</title>

    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="main">
      <div class="main__container">
        <section class="main__card">
          <picture>
            <source
              media="(max-width: 500px)"
              srcset="./images/bg-main-mobile.png"
            />
            <img src="./images/bg-main-desktop.png" alt="background main" />
          </picture>
          <div class="front__card">
            <img
              src="./images/card-logo.svg"
              alt="card logo"
              class="front__card-logo"
            />
            <p class="front__card-number">0000 0000 0000 0000</p>
            <div class="front__card-data">
              <p class="data-name">Jane Appleseed</p>
              <p>
                <span class="data-month">00</span><span>/</span
                ><span class="data-year">00</span>
              </p>
            </div>
          </div>
          <div class="back__card">
            <p class="back__card-text">000</p>
          </div>
        </section>
        <section class="main__form">
          <form action="#" class="form" id="form" novalidate>
            <div class="form__name">
              <label for="cardName">Cardholder Name</label>
              <input
                type="text"
                name="cardName"
                id="cardName"
                placeholder="e.g. Jane Appleseed"
                required
              />
              <small class="error cardName"></small>
            </div>
            <div class="form__number">
              <label for="cardNumber">Card Number</label>
              <input
                type="text"
                name="cardNumber"
                id="cardNumber"
                inputmode="numeric"
                maxlength="19"
                placeholder="e.g. 1234 5678 9123 0000"
                required
              />
              <small class="error cardNumber"></small>
            </div>
            <div class="form__secret">
              <div class="form__date">
                <label for="cardYear">Exp. Date (MM/YY)</label>
                <input
                  type="text"
                  inputmode="numeric"
                  name="cardMonth"
                  id="cardMonth"
                  maxlength="2"
                  placeholder="MM"
                  required
                />
                <input
                  type="text"
                  inputmode="numeric"
                  name="cardYear"
                  id="cardYear"
                  maxlength="2"
                  placeholder="YY"
                  required
                />
                <small class="error exp"></small>
              </div>
              <div class="form__cvc">
                <label for="cardCvc">CVC</label>
                <input
                  type="text"
                  inputmode="numeric"
                  name="cardCvc"
                  id="cardCvc"
                  maxlength="3"
                  placeholder="e.g. 123"
                  required
                />
                <small class="error cardCvc"></small>
              </div>
            </div>

            <button class="card__btn card__confirm">Confirm</button>
          </form>
        </section>
      </div>
    </main>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Sasha Yerokhov</a>.
    </div>
    <script src="app.js"></script>
  </body>
</html>
